<script>
const $=i=>document.getElementById(i),sb=$('sb'),hint=$('hint');
function escapeHTML(str){
return String(str||'').replace(/[&<>"']/g, s => ({
'&':'&amp;',
'<':'&lt;',
'>':'&gt;',
'"':'&quot;',
"'":'&#39;'
}[s]));

const map=L.map('map',{zoomControl:false}).setView([38.2686,140.8722],16);
map.doubleClickZoom.disable();
L.control.zoom({position:'topright'}).addTo(map);

const photo = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg',{maxZoom:18,attribution:'国土地理院写真'});
const osm = L.tileLayer('https://tile.openstreetmap.jp/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap contributors'});
gsi.addTo(map);
photo.on('tileerror', ()=> {show('写真読込失敗');});
const baseMaps = {"地図": gsi,"航空写真": photo,"OSM": osm};
L.control.layers(baseMaps, null, {position:'topright'}).addTo(map);

osm.on('tileerror',()=>{ errorCount++; if(errorCount>3){ map.removeLayer(osm); gsi.addTo(map); show('OSM不調→地理院に切替'); }});

const layer=L.layerGroup().addTo(map);

map.on('mousemove', e=>{if(tool!=='bld' || !bldStart) return;if(bldRect) map.removeLayer(bldRect);bldRect = L.rectangle([bldStart, e.latlng], {color:'#2563eb', weight:3, fillOpacity:.25, dashArray:'5,5'}).addTo(map);});
map.on('mouseup', e=>{if(tool!=='bld' || !bldStart) return;map.dragging.enable();if(bldRect){ map.removeLayer(bldRect); bldRect=null; }const r = L.rectangle([bldStart, e.latlng], {color:'#2563eb', weight:3, fillOpacity:.2}).addTo(layer);stack.push(r);bldStart=null;show('建物配置');});
map.on('touchstart', e=>{if(tool!=='bld') return;if(e.touches && e.touches.length > 1) return;isDrawingBld = true;bldStart=e.latlng;map.dragging.disable();});
map.on('touchmove', e=>{if(tool!=='bld' || !bldStart) return;if(bldRect) map.removeLayer(bldRect);bldRect = L.rectangle([bldStart, e.latlng], {color:'#2563eb', weight:3, fillOpacity:.25, dashArray:'5,5'}).addTo(map);});
map.on('touchend', e=>{if(tool!=='bld' || !bldStart) return;map.dragging.enable();if(bldRect){ map.removeLayer(bldRect); bldRect=null; }const r = L.rectangle([bldStart, e.latlng], {color:'#2563eb', weight:3, fillOpacity:.2}).addTo(layer);stack.push(r);bldStart=null;isDrawingBld = false;show('建物配置');});
function handleMapTap(e){if(!tool) return;const ll = e.latlng;if(tool==='pole'||tool==='trans'||tool==='comment'){open(tool,ll);return;}if(['line','hline','hikikomi'].includes(tool)){if(!tmp.length){tmp.push(ll);dot = L.circleMarker(ll,{radius:5,color:'red',fillColor:'yellow',fillOpacity:1}).addTo(map);}else{tmp.push(ll);const col = {line:'#000',hline:'#7c3aed',hikikomi:'#dc2626'}[tool];const l = L.polyline(tmp,{color:col,weight:4}).addTo(layer);stack.push(l);if(stack.length>300)stack.shift();map.removeLayer(dot);dot=null;tmp=[];}}}
let lastTouchTime = 0;
let isTouch = false;
map.on('click', function(e){if(isTouch){isTouch = false;return;}handleMapTap(e);});

map.on('touchend', function(e){if(isDrawingBld) return;if(tool === 'bld') return;if(!tool) return;if(touchMoved && tool !== 'line' && tool !== 'hline' && tool !== 'hikikomi') return;const touch = e.originalEvent?.changedTouches?.[0];if(!touch) return;const rect = map.getContainer().getBoundingClientRect();const point = L.point(touch.clientX - rect.left,touch.clientY - rect.top);const latlng = map.containerPointToLatLng(point);handleMapTap({ latlng });});
let touchMoved = false;
let touchStartPos = null;
map.on('touchstart', function(e){isTouch = true;touchMoved = false;if(e.touches && e.touches[0]){touchStartPos = e.touches[0];}});
map.on('movestart', ()=>{ touchMoved = true; });
map.on('touchmove', function(e){if(!touchStartPos || !e.touches[0]) return;const dx = Math.abs(e.touches[0].clientX - touchStartPos.clientX);const dy = Math.abs(e.touches[0].clientY - touchStartPos.clientY);if(dx > 20 || dy > 20){touchMoved = true;}});
$('undo').onclick=()=>{const l=stack.pop();if(l)layer.removeLayer(l)};
$('undo').oncontextmenu = (e)=>{e.preventDefault();if(confirm('すべて戻しますか？')){while(stack.length){layer.removeLayer(stack.pop());}}};
$('gps').onclick=()=>{if(!navigator.geolocation){show('GPS未対応');return}navigator.geolocation.getCurrentPosition(p=>map.setView([p.coords.latitude,p.coords.longitude],map.getZoom()||18),()=>show('位置取得できません'),{enableHighAccuracy:true,timeout:10000})};
$('addrSearch').onclick=async()=>{const q=$('jusho').value.trim();if(!q){show('住所入力');return}show('検索中...');try{const res=await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=5&countrycodes=jp&q='+encodeURIComponent(q),{headers:{'Accept-Language':'ja'}});const data=await res.json();if(data && data.length){const p=data[0];map.setView([+p.lat, +p.lon], 18);L.marker([+p.lat, +p.lon]).addTo(layer).bindPopup(p.display_name).openPopup();show('移動しました');}else{const res2=await fetch('https://msearch.gsi.go.jp/address-search/?q='+encodeURIComponent(q));const d2=await res2.json();if(d2 && d2.length){const [lon,lat]=d2[0].geometry.coordinates;map.setView([lat,lon],18);show('移動しました');}else show('見つからず');}}catch(e){show('検索エラー')}};
$('save').onclick=()=>{try{const data={form:{},layers:[]};['genba','company','tanto','tanto_free','jusho','koji','kyokyu','keiyaku','amp','dv','sz','dv_len','hikikomi_basho','trans_basho','trans1','trans2','biko','juten','kensa','meter','h1','h2','h3','e1','e2','e3','e4','e5','e6'].forEach(id=>{const el=$(id);if(el)data.form[id]=el.type==='checkbox'?el.checked:el.value});layer.eachLayer(l=>{if(l.getLatLng&&l.options.icon){const html=l.options.icon.options.html||'';if(html.includes('comment-text')){data.layers.push({t:'comment',lat:l.getLatLng().lat,lng:l.getLatLng().lng,text: l._commentText || ''})}else{const isPole=html.includes('#000');data.layers.push({t:isPole?'pole':'trans',lat:l.getLatLng().lat,lng:l.getLatLng().lng,name:l.getTooltip?l.getTooltip().getContent()||'':''})}}else if(l.getLatLngs){const pts=l.getLatLngs();const flat=(Array.isArray(pts[0])?pts[0]:pts).map(p=>[p.lat,p.lng]);data.layers.push({t:'poly',pts:flat,color:l.options.color})}});const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download = (data.form.genba||'申請') + '_' + new Date().toISOString().slice(0,10) + '.json';a.click();show('端末に保存')}catch(e){alert(e)}};
$('load').onclick=()=>{const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=e=>{const f=e.target.files[0];const r=new FileReader();r.onload=ev=>{let d;try{d=JSON.parse(ev.target.result)}catch(e){alert('ファイルが壊れています');return};Object.entries(d.form||{}).forEach(([k,v])=>{const el=$(k);if(el){if(el.type==='checkbox')el.checked=v;else el.value=v}});layer.clearLayers();stack=[];(d.layers||[]).forEach(it=>{if(it.t==='pole'||it.t==='trans'){const isP=it.t==='pole';const html=`<div style="width:${isP?22:24}px;height:${isP?22:24}px;border:3px solid ${isP?'#000':'red'};background:#fff;border-radius:50%"></div>`;const m=L.marker([it.lat,it.lng],{draggable:true,icon:L.divIcon({className:'',html,iconSize:[22,22],iconAnchor:[11,11]})}).addTo(layer);if(it.name)m.bindTooltip(it.name,{permanent:true,direction:'top',offset:[0,-10],className:'pole-label'}).openTooltip();stack.push(m)}else if(it.t==='poly'){stack.push(L.polyline(it.pts,{color:it.color,weight:4}).addTo(layer))}else if(it.t==='comment'){const m=L.marker([it.lat,it.lng],{draggable:true,icon:L.divIcon({className:'',html:`<div class="comment-text" contenteditable="false">${escapeHTML(it.text)}</div>`,iconSize:[0,0]})}).addTo(layer);m._commentText = it.text || ''; m.on('add', ()=>{ const el=m.getElement(); if(el){ const ct=el.querySelector('.comment-text'); if(ct){ ct.addEventListener('input', e=>{ m._commentText = e.target.innerText; }); } } }); stack.push(m)}});show('読込完了')};r.readAsText(f)};i.click()};
$('share').onclick=()=>{$('sharePanel').style.display='block';$('sharePanel').classList.add('show')};
function closeShare(){$('sharePanel').classList.remove('show');setTimeout(()=>$('sharePanel').style.display='none',200);}
$('shareCancel').onclick = () => {closeShare();};
$('toLine').onclick=()=>{window.open('https://line.me/R/msg/text/?'+encodeURIComponent('【電力申請】'+$('genba').value+' '+$('jusho').value),'_blank');closeShare();};
$('toMail').onclick=()=>{location.href='mailto:?subject='+encodeURIComponent('電力申請 '+$('genba').value)+'&body='+encodeURIComponent($('jusho').value);closeShare();};
$('screenshot').onclick=()=>{html2canvas($('map'),{useCORS:true}).then(c=>{const a=document.createElement('a');a.href=c.toDataURL();a.download=($('genba').value||'map')+'.png';a.click()})};
$('print').onclick=()=>{try {$('ph_genba').textContent = $('genba').value || '';const tantoVal = $('tanto').value === '__edit__' ? $('tanto_free').value : $('tanto').value;$('ph_tanto').textContent = tantoVal || '';$('ph_jusho').textContent = $('jusho').value || '';} catch(e) {}sb.classList.remove('hidden');map.invalidateSize();map.whenReady(()=>{setTimeout(()=>{map.invalidateSize();setTimeout(()=>window.print(), 500);}, 300);});};
$('clear').onclick=()=>{if(confirm('全削除？')){layer.clearLayers();stack=[]}};
$('tanto').onchange=()=>{$('tanto_free').style.display=$('tanto').value==='__edit__'?'block':'none'};
const TANTO_DEFAULT=['相澤輝','相澤泰','布田','佐伯','千田','佐藤'];
if(!localStorage.getItem('tantoList')){localStorage.setItem('tantoList', JSON.stringify(TANTO_DEFAULT));}
function getTantoList(){return JSON.parse(localStorage.getItem('tantoList')||JSON.stringify(TANTO_DEFAULT));}
function saveTantoList(list){localStorage.setItem('tantoList',JSON.stringify(list));}
function refreshTanto(){const list=getTantoList();const s=$('tanto');s.innerHTML='<option value="">--選択--</option>'+list.map(n=>`<option>${n}</option>`).join('')+'<option value="__edit__">＋直接入力</option>';}
function renderTantoList(){const list=getTantoList();const div=$('tantoList');div.innerHTML=list.map((n,i)=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:4px;background:#fff;border:1px solid #e5e7eb;border-radius:4px;margin-bottom:3px;font-size:12px"><span>${n}</span><button data-i="${i}" class="tantoDel" style="width:40px;height:22px;background:#ef4444;color:#fff;border:none;border-radius:3px;font-size:11px">削除</button></div>`).join('');div.querySelectorAll('.tantoDel').forEach(b=>b.onclick=()=>{const i=+b.dataset.i;const l=getTantoList();l.splice(i,1);saveTantoList(l);renderTantoList();refreshTanto();});}
refreshTanto();
$('tantoEditBtn').onclick=()=>{renderTantoList();$('tantoPanel').style.display='block';$('tantoNew').value='';$('tantoNew').focus();};
$('tantoClose').onclick=()=>{$('tantoPanel').style.display='none'};
$('tantoAdd').onclick=()=>{const v=$('tantoNew').value.trim();if(!v)return;const l=getTantoList();if(l.length>50){alert('登録上限です');return}if(!l.includes(v)){l.push(v);saveTantoList(l);renderTantoList();refreshTanto();$('tantoNew').value='';show('追加しました');}};
$('tantoNew').onkeydown=e=>{if(e.key==='Enter'){$('tantoAdd').click()}};
setTimeout(()=>map.invalidateSize(),500);
</script></body></html>
